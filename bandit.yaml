# Bandit security scanner configuration
# https://bandit.readthedocs.io/

# Directories to exclude from scanning
exclude_dirs:
  - ".git"
  - "__pycache__"
  - "node_modules"
  - "akshare"  # Third-party library, not our code

# Tests to skip with rationale
skips:
  # B608: Table/column names use safe_table_name() which validates against
  # ^[A-Za-z_][A-Za-z0-9_]*$ - identifiers are never from raw user input.
  - B608
  # B104: Binding to 0.0.0.0 is intentional for Docker/cloud - listen on all
  # interfaces. Production deployments use reverse proxy (nginx) and firewall.
  - B104
